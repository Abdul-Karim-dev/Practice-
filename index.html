<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Navbar + Banner</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f5f7fb;
}

/* NAVBAR */
.navbar {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 60px;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  z-index: 1000;
}

.logo {
  font-size: 1.6rem;
  font-weight: bold;
  color: #2a5298;
}

.nav-links {
  display: flex;
  gap: 35px;
}

.nav-links a {
  text-decoration: none;
  color: #333;
  font-weight: 500;
  position: relative;
}

.nav-links a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  bottom: -6px;
  left: 0;
  background: #2a5298;
  transition: 0.3s;
}

.nav-links a:hover::after {
  width: 100%;
}

.cta {
  background: #2a5298;
  color: white;
  padding: 8px 18px;
  border-radius: 25px;
}

/* HERO / BANNER */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
}

.hero-text {
  max-width: 500px;
}

.hero-text h1 {
  font-size: 3rem;
  margin-bottom: 20px;
  line-height: 1.2;
}

.hero-text p {
  font-size: 1.1rem;
  margin-bottom: 30px;
  opacity: 0.9;
}

.hero-buttons a {
  text-decoration: none;
  padding: 12px 25px;
  border-radius: 30px;
  margin-right: 15px;
  font-weight: 500;
}

.btn-primary {
  background: white;
  color: #2a5298;
}

.btn-secondary {
  border: 1px solid white;
  color: white;
}

/* HERO IMAGE */
.hero-image img {
  width: 500px;
  max-width: 100%;
}

/* MOBILE */
.menu-toggle {
  display: none;
  flex-direction: column;
  cursor: pointer;
}

.menu-toggle span {
  height: 3px;
  width: 25px;
  background: #333;
  margin: 4px 0;
}

@media(max-width: 900px) {
  .hero {
    flex-direction: column;
    text-align: center;
    padding-top: 120px;
  }

  .hero-image {
    margin-top: 30px;
  }
}

@media(max-width: 768px) {
  .nav-links {
    position: absolute;
    top: 70px;
    right: 0;
    background: white;
    flex-direction: column;
    width: 220px;
    padding: 20px;
    transform: translateX(100%);
    transition: 0.3s;
  }

  .nav-links.active {
    transform: translateX(0);
  }

  .menu-toggle {
    display: flex;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">MyBrand</div>

  <div class="menu-toggle" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="nav-links" id="navLinks">
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Pricing</a>
    <a href="#">Contact</a>
    <a href="#" class="cta">Get Started</a>
  </div>
</nav>

<!-- HERO / BANNER -->
<section class="hero">
  <div class="hero-text">
    <h1>Build Something Amazing</h1>
    <p>
      Create modern, fast, and responsive websites with clean design and powerful features.
    </p>
    <div class="hero-buttons">
      <a href="#" class="btn-primary">Start Now</a>
      <a href="#" class="btn-secondary">Learn More</a>
    </div>
  </div>

  <div class="hero-image">
    <img src="https://illustrations.popsy.co/white/web-design.svg" alt="banner">
  </div>
</section>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
